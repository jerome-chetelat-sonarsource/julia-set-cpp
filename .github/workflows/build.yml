name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Generate compile_commands.json
        run: |
          cat > compile_commands.json << EOF
          [
            {
              "directory": "$GITHUB_WORKSPACE/src",
              "command": "c++ -std=c++17 julia_set.cpp -o ../julia_set",
              "file": "julia_set.cpp"
            }
          ]
          EOF
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@jh/SQSCANGHA-144_add_qa_gate_job
        with:
          args: >
            -Dsonar.scanner.sonarcloudUrl=${{ vars.SONAR_CLOUD_URL }}
            -Dsonar.scanner.apiBaseUrl=${{ vars.SONAR_API_BASE_URL }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
